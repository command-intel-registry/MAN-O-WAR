<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Man O' War — Member Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --olive:#2B3323; --khaki:#C7B888; --sand:#EDE6D6;
    --brass:#A8863C; --brass-bright:#C9A050; --ink:#1C2118; --alert:#8B3A2E; --ok:#5A7A4A;
    --border:rgba(199,184,136,0.25);
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--olive); color:var(--sand); font-family:'Inter',sans-serif; min-height:100vh; }
  button{ cursor:pointer; font-family:'Inter',sans-serif; }
  input{ font-family:'IBM Plex Mono',monospace; }

  #loginScreen{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .loginBox{ width:100%; max-width:380px; text-align:center; }
  .seal{ width:56px; height:56px; border-radius:9999px; border:2px solid var(--brass); display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 30% 25%, rgba(201,160,80,0.2), transparent 70%); margin:0 auto 14px; }
  .seal span{ font-family:'Oswald',sans-serif; font-weight:700; color:var(--brass-bright); font-size:18px; }
  h1{ font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:22px; margin:16px 0 4px; }
  .sub{ color:var(--khaki); font-size:11px; text-transform:uppercase; letter-spacing:0.18em; margin-bottom:28px; }
  .card{ background:var(--ink); border:1px solid var(--border); border-radius:4px; padding:24px; text-align:left; }
  label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--khaki); margin-bottom:6px; }
  input{ width:100%; background:rgba(199,184,136,0.06); border:1px solid var(--border); border-radius:3px; padding:10px 12px; color:var(--sand); font-size:14px; margin-bottom:14px; text-transform:uppercase; }
  input:focus{ outline:none; border-color:var(--brass); }
  .btn-brass{ width:100%; background:var(--brass); color:var(--ink); border:none; border-radius:3px; padding:12px; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; font-family:'Oswald',sans-serif; }
  .btn-brass:hover{ background:var(--brass-bright); }
  .btn-brass:disabled{ opacity:0.5; }
  .error{ background:rgba(139,58,46,0.15); border:1px solid rgba(139,58,46,0.4); color:#E8B4A8; font-size:13px; padding:10px 12px; border-radius:3px; margin-bottom:14px; }

  #portal{ display:none; }
  header{ display:flex; align-items:center; gap:10px; padding:16px 20px; border-bottom:1px solid var(--border); }
  header h1{ font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:15px; margin:0; }
  .tabs{ display:flex; gap:2px; overflow-x:auto; padding:0 20px; border-bottom:1px solid var(--border); }
  .tab-btn{ background:none; border:none; color:var(--khaki); padding:12px 16px; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; border-bottom:2px solid transparent; font-family:'Oswald',sans-serif; white-space:nowrap; }
  .tab-btn.active{ color:var(--brass-bright); border-bottom-color:var(--brass); }
  main{ max-width:600px; margin:0 auto; padding:24px 20px 60px; }
  .tab-pane{ display:none; }
  .tab-pane.active{ display:block; }

  .id-card{ width:280px; margin:0 auto; background:linear-gradient(160deg, #F3EFE4, #E8E1D0); border-radius:16px; overflow:hidden; box-shadow:0 20px 50px -12px rgba(0,0,0,0.5); color:#1C2118; }
  .id-header{ background:linear-gradient(135deg, var(--olive), #3A4530); padding:14px 16px; display:flex; align-items:center; gap:10px; }
  .id-header .crest{ width:30px; height:30px; border-radius:9999px; border:1.5px solid var(--brass-bright); display:flex; align-items:center; justify-content:center; }
  .id-header .crest span{ font-family:'Oswald',sans-serif; font-weight:700; color:var(--brass-bright); font-size:11px; }
  .id-header .t1{ font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:12px; font-weight:600; color:var(--sand); }
  .id-photo-row{ display:flex; justify-content:center; padding:18px 0 8px; }
  .id-photo{ width:84px; height:84px; border-radius:9999px; background:#D8D0BC; border:3px solid var(--brass); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .id-photo img{ width:100%; height:100%; object-fit:cover; }
  .id-photo svg{ width:48px; height:48px; opacity:0.35; }
  .id-name{ text-align:center; font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:16px; font-weight:600; margin:4px 0 2px; }
  .id-code{ text-align:center; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#7A5B2E; margin-bottom:8px; }
  .id-status-row{ display:flex; justify-content:center; padding-bottom:18px; }
  .id-status{ font-size:10px; text-transform:uppercase; letter-spacing:0.08em; padding:4px 12px; border-radius:99px; background:rgba(90,122,74,0.18); color:#3F5A32; font-weight:600; }

  .ann-card{ background:var(--ink); border:1px solid var(--border); border-radius:4px; padding:16px 18px; margin-bottom:10px; }
  .ann-card.pinned{ border-color:var(--brass); }
  .ann-title{ font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:14px; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .pin-badge{ font-size:9px; background:var(--brass); color:var(--ink); padding:2px 8px; border-radius:99px; }
  .ann-content{ font-size:13px; color:rgba(237,230,214,0.8); line-height:1.5; }
  .ann-date{ font-size:10px; color:var(--khaki); margin-top:8px; text-transform:uppercase; letter-spacing:0.05em; }

  .lead-row{ display:flex; justify-content:space-between; align-items:center; background:var(--ink); border:1px solid var(--border); border-radius:4px; padding:14px 18px; margin-bottom:8px; }
  .lead-name{ font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:14px; }
  .lead-role{ font-size:10px; text-transform:uppercase; letter-spacing:0.08em; padding:4px 12px; border-radius:99px; background:rgba(168,134,60,0.18); color:var(--brass-bright); }

  .chat-box{ background:var(--ink); border:1px solid var(--border); border-radius:4px; padding:16px; }
  .chat-history{ max-height:360px; overflow-y:auto; margin-bottom:12px; }
  .chat-msg{ margin-bottom:10px; }
  .chat-msg.user{ text-align:right; }
  .chat-msg span{ display:inline-block; padding:8px 12px; border-radius:10px; font-size:13px; max-width:85%; text-align:left; }
  .chat-msg.user span{ background:rgba(168,134,60,0.2); color:var(--brass-bright); }
  .chat-msg.ai span{ background:rgba(199,184,136,0.08); color:var(--sand); }
  .chat-input-row{ display:flex; gap:8px; }
  .chat-input-row input{ flex:1; margin-bottom:0; text-transform:none; }

  .empty{ text-align:center; padding:30px 20px; color:rgba(237,230,214,0.4); font-size:13px; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="loginBox">
    <div class="seal"><span>GTC</span></div>
    <h1>Member Portal</h1>
    <p class="sub">Man O' War — Cadet Access</p>
    <div class="card">
      <div id="loginError" class="error" style="display:none"></div>
      <label>Member Code</label>
      <input type="text" id="memberCode" placeholder="e.g. 1 or GTC-0001">
      <label>Secret Code</label>
      <input type="text" id="secretCode" placeholder="6-character code">
      <button class="btn-brass" id="loginBtn" onclick="enterPortal()">Enter Portal</button>
    </div>
  </div>
</div>

<div id="portal">
  <header>
    <div class="seal" style="width:36px;height:36px;"><span style="font-size:11px;">GTC</span></div>
    <h1>Member Portal</h1>
  </header>
  <div class="tabs">
    <button class="tab-btn active" data-tab="idcard" onclick="switchTab('idcard')">ID Card</button>
    <button class="tab-btn" data-tab="announcements" onclick="switchTab('announcements')">Announcements</button>
    <button class="tab-btn" data-tab="leadership" onclick="switchTab('leadership')">Leadership</button>
    <button class="tab-btn" data-tab="ai" onclick="switchTab('ai')">Tactical AI</button>
  </div>
  <main>
    <div id="pane-idcard" class="tab-pane active">
      <div class="id-card">
        <div class="id-header">
          <div class="crest"><span>GTC</span></div>
          <div class="t1">Man O' War Cadet ID</div>
        </div>
        <div class="id-photo-row"><div class="id-photo" id="portalPhoto"></div></div>
        <div class="id-name" id="portalName">—</div>
        <div class="id-code" id="portalCode">—</div>
        <div class="id-status-row"><span class="id-status" id="portalStatus">—</span></div>
      </div>
    </div>

    <div id="pane-announcements" class="tab-pane">
      <div id="announcementsList"></div>
    </div>

    <div id="pane-leadership" class="tab-pane">
      <div id="leadershipList"></div>
    </div>

    <div id="pane-ai" class="tab-pane">
      <div class="chat-box">
        <div class="chat-history" id="chatHistory">
          <p class="empty">Ask the Tactical AI anything - conduct, history, first aid, unit structure.</p>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Type your question..." style="text-transform:none" onkeydown="if(event.key==='Enter') sendChat()">
          <button class="btn-brass" style="width:auto; padding:10px 18px;" onclick="sendChat()">Send</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const PORTAL_URL = "https://vecfcvczglapfjidirjw.supabase.co/functions/v1/member-portal";
  const CHAT_URL = "https://vecfcvczglapfjidirjw.supabase.co/functions/v1/tactical-ai-chat";
  let chatHistoryArr = [];

  async function enterPortal(){
    const memberCode = document.getElementById('memberCode').value.trim();
    const secretCode = document.getElementById('secretCode').value.trim();
    const btn = document.getElementById('loginBtn');
    const errBox = document.getElementById('loginError');
    errBox.style.display = 'none';

    if(!memberCode || !secretCode){
      errBox.textContent = 'Enter both your member code and secret code.';
      errBox.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Checking...';

    try {
      const resp = await fetch(PORTAL_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ member_code: memberCode, secret_code: secretCode })
      });
      const data = await resp.json();

      btn.disabled = false;
      btn.textContent = 'Enter Portal';

      if(!resp.ok || data.error){
        errBox.textContent = data.error || 'Something went wrong.';
        errBox.style.display = 'block';
        return;
      }

      document.getElementById('portalName').textContent = data.member.full_name;
      document.getElementById('portalCode').textContent = data.member.member_code;
      document.getElementById('portalStatus').textContent = data.member.status.toUpperCase();

      const photoWrap = document.getElementById('portalPhoto');
      photoWrap.innerHTML = data.member.photo_url
        ? `<img src="${data.member.photo_url}">`
        : `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/></svg>`;

      const annList = document.getElementById('announcementsList');
      if(!data.announcements || data.announcements.length === 0){
        annList.innerHTML = '<p class="empty">No announcements yet.</p>';
      } else {
        annList.innerHTML = data.announcements.map(a => `
          <div class="ann-card ${a.pinned ? 'pinned' : ''}">
            <div class="ann-title">${escapeHtml(a.title)} ${a.pinned ? '<span class="pin-badge">PINNED</span>' : ''}</div>
            <div class="ann-content">${escapeHtml(a.content)}</div>
            <div class="ann-date">${new Date(a.created_at).toLocaleDateString()}</div>
          </div>
        `).join('');
      }

      const leadList = document.getElementById('leadershipList');
      if(!data.leadership || data.leadership.length === 0){
        leadList.innerHTML = '<p class="empty">No leadership listed yet.</p>';
      } else {
        leadList.innerHTML = data.leadership.map(l => `
          <div class="lead-row">
            <span class="lead-name">${escapeHtml(l.full_name || 'Unnamed')}</span>
            <span class="lead-role">${escapeHtml(l.role)}</span>
          </div>
        `).join('');
      }

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('portal').style.display = 'block';
    } catch(e){
      btn.disabled = false;
      btn.textContent = 'Enter Portal';
      errBox.textContent = 'Could not reach the server. Try again.';
      errBox.style.display = 'block';
    }
  }

  function switchTab(name){
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + name).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  }

  async function sendChat(){
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if(!message) return;
    input.value = '';

    const history = document.getElementById('chatHistory');
    if(history.querySelector('.empty')) history.innerHTML = '';

    history.insertAdjacentHTML('beforeend', `<div class="chat-msg user"><span>${escapeHtml(message)}</span></div>`);
    history.scrollTop = history.scrollHeight;
    chatHistoryArr.push('USER: ' + message);

    try {
      const resp = await fetch(CHAT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history: chatHistoryArr })
      });
      const data = await resp.json();

      if(!resp.ok || data.error){
        history.insertAdjacentHTML('beforeend', `<div class="chat-msg ai"><span>Error: ${escapeHtml(data.error || 'Something went wrong')}</span></div>`);
        return;
      }

      history.insertAdjacentHTML('beforeend', `<div class="chat-msg ai"><span>${escapeHtml(data.reply)}</span></div>`);
      chatHistoryArr.push('AI: ' + data.reply);
      history.scrollTop = history.scrollHeight;
    } catch(e){
      history.insertAdjacentHTML('beforeend', `<div class="chat-msg ai"><span>Could not reach the AI. Try again.</span></div>`);
    }
  }

  function escapeHtml(s){
    return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
</script>
</body>
</html>
